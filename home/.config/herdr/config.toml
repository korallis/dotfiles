onboarding = false

[ui]
agent_panel_sort = "spaces"
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "herdr"

# Follow the terminal (wezterm) colours instead of a fixed herdr palette.
[theme]
name = "terminal"
auto_switch = false

[keys]
# Neovim-style direct Cmd chords (no prefix).
# Splits: Cmd+H = horizontal, Cmd+L = vertical.
# Navigation: Cmd+Arrow keys focus the pane in that direction.
# Close: Cmd+W closes the focused pane/window.
split_horizontal = "cmd+h"
split_vertical    = "cmd+l"
focus_pane_left  = "cmd+left"
focus_pane_down  = "cmd+down"
focus_pane_up    = "cmd+up"
focus_pane_right = "cmd+right"
close_pane = "cmd+w"
